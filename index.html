<!DOCTYPE html>
<html>
<head>
    <title>AR Pemandangan Roblox</title>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin : 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">    
        
        <a-assets>
            <a-asset-item id="pemandangan-roblox" src="URL_MODEL_ROBLOX_KAMU.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            
            <a-entity gltf-model="#pemandangan-roblox" 
                      position="0 0 0" 
                      scale="0.05 0.05 0.05" 
                      animation="property: rotation; to: 0 360 0; loop: true; dur: 15000">
            </a-entity>
            
        </a-marker>
        <a-entity camera></a-entity>
        
    </a-scene>
</body>
</html>
