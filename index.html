<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR Truk Tanjakan - Hiro Marker</title>
  <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #info {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.65); color: #fff; padding: 6px 18px;
      border-radius: 20px; font-family: sans-serif; font-size: 13px;
      z-index: 999; pointer-events: none; letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div id="info">📷 Arahkan kamera ke marker Hiro</div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true;"
    vr-mode-ui="enabled: false">

    <a-marker preset="hiro" id="marker">

      <!-- ===================== JALAN TANJAKAN ===================== -->
      <!-- Aspal tanjakan miring ke atas dari kiri ke kanan -->
      <a-box
        position="0 0.01 0"
        width="2.4" height="0.04" depth="0.9"
        rotation="0 0 12"
        color="#3a3a3a">
      </a-box>
      <!-- Garis tengah jalan (putih putus) -->
      <a-box position="-0.4 0.07 0" width="0.3" height="0.01" depth="0.04" rotation="0 0 12" color="#f0e050"></a-box>
      <a-box position="0.1 0.11 0" width="0.3" height="0.01" depth="0.04" rotation="0 0 12" color="#f0e050"></a-box>
      <a-box position="0.6 0.15 0" width="0.3" height="0.01" depth="0.04" rotation="0 0 12" color="#f0e050"></a-box>

      <!-- Batu/tanah tepi kiri -->
      <a-box position="-1.1 0.05 0.38" width="0.18" height="0.1" depth="0.18" color="#7a6a50"></a-box>
      <a-box position="-0.85 0.04 0.4" width="0.14" height="0.08" depth="0.14" color="#8a7a60"></a-box>
      <!-- Batu tepi kanan -->
      <a-box position="-0.7 0.04 -0.4" width="0.16" height="0.09" depth="0.16" color="#7a6a50"></a-box>
      <a-box position="-0.3 0.06 -0.42" width="0.12" height="0.07" depth="0.12" color="#8a7a60"></a-box>

      <!-- Pohon kecil kiri -->
      <a-box position="-1.0 0.18 0.44" width="0.05" height="0.22" depth="0.05" color="#6b4c2a"></a-box>
      <a-cone position="-1.0 0.38 0.44" radius-bottom="0.12" radius-top="0.01" height="0.22" color="#2d6a2d"></a-cone>
      <!-- Pohon kecil kanan -->
      <a-box position="-0.5 0.14 -0.46" width="0.05" height="0.18" depth="0.05" color="#6b4c2a"></a-box>
      <a-cone position="-0.5 0.3 -0.46" radius-bottom="0.1" radius-top="0.01" height="0.18" color="#2d6a2d"></a-cone>

      <!-- ===================== TRUK ===================== -->
      <!--
        Truk bergerak ke atas tanjakan sambil goyang pelan (tidak kuat),
        body miring mengikuti sudut jalan (12 derajat)
        Bergerak dari kanan ke kiri (turun → naik tanjakan)
      -->
      <a-entity id="truck-group"
        animation__move="property: position; from: 0.7 0.38 0; to: -0.7 0.09 0; dir: alternate; loop: true; dur: 6000; easing: easeInOutSine">

        <!-- Getaran/goyang (tidak kuat naik) -->
        <a-entity
          animation__shake="property: rotation; from: 12 0 -1.5; to: 12 0 1.5; dir: alternate; loop: true; dur: 180; easing: easeInOutSine"
          animation__bounce="property: position; from: 0 0 0; to: 0 0.012 0; dir: alternate; loop: true; dur: 220; easing: easeInOutSine">

          <!-- ===== CHASIS / BAK BAWAH ===== -->
          <a-box
            position="0 0 0"
            width="0.72" height="0.08" depth="0.36"
            color="#555">
          </a-box>

          <!-- ===== RODA (4 buah) ===== -->
          <!-- Roda depan kiri -->
          <a-cylinder id="wheel-fl"
            position="0.24 -0.09 0.19"
            radius="0.095" height="0.07"
            rotation="90 0 0"
            color="#1a1a1a"
            animation__spinfl="property: rotation; from: 90 0 0; to: 90 3600 0; loop: true; dur: 3000">
            <a-cylinder position="0 0 0" radius="0.055" height="0.075" color="#888"></a-cylinder>
            <a-cylinder position="0 0 0" radius="0.018" height="0.08" color="#ccc"></a-cylinder>
          </a-cylinder>
          <!-- Roda depan kanan -->
          <a-cylinder id="wheel-fr"
            position="0.24 -0.09 -0.19"
            radius="0.095" height="0.07"
            rotation="90 0 0"
            color="#1a1a1a"
            animation__spinfr="property: rotation; from: 90 0 0; to: 90 3600 0; loop: true; dur: 3000">
            <a-cylinder position="0 0 0" radius="0.055" height="0.075" color="#888"></a-cylinder>
            <a-cylinder position="0 0 0" radius="0.018" height="0.08" color="#ccc"></a-cylinder>
          </a-cylinder>
          <!-- Roda belakang kiri -->
          <a-cylinder id="wheel-rl"
            position="-0.24 -0.09 0.19"
            radius="0.105" height="0.075"
            rotation="90 0 0"
            color="#1a1a1a"
            animation__spinrl="property: rotation; from: 90 0 0; to: 90 3600 0; loop: true; dur: 3000">
            <a-cylinder position="0 0 0" radius="0.062" height="0.08" color="#888"></a-cylinder>
            <a-cylinder position="0 0 0" radius="0.02" height="0.085" color="#ccc"></a-cylinder>
          </a-cylinder>
          <!-- Roda belakang kanan -->
          <a-cylinder id="wheel-rr"
            position="-0.24 -0.09 -0.19"
            radius="0.105" height="0.075"
            rotation="90 0 0"
            color="#1a1a1a"
            animation__spinrr="property: rotation; from: 90 0 0; to: 90 3600 0; loop: true; dur: 3000">
            <a-cylinder position="0 0 0" radius="0.062" height="0.08" color="#888"></a-cylinder>
            <a-cylinder position="0 0 0" radius="0.02" height="0.085" color="#ccc"></a-cylinder>
          </a-cylinder>

          <!-- ===== BAK MUATAN ===== -->
          <a-box position="-0.12 0.13 0" width="0.44" height="0.18" depth="0.34" color="#c0392b"></a-box>
          <!-- Dinding bak kiri -->
          <a-box position="-0.12 0.21 0.17" width="0.44" height="0.14" depth="0.015" color="#a93226"></a-box>
          <!-- Dinding bak kanan -->
          <a-box position="-0.12 0.21 -0.17" width="0.44" height="0.14" depth="0.015" color="#a93226"></a-box>
          <!-- Dinding belakang bak -->
          <a-box position="-0.34 0.21 0" width="0.015" height="0.14" depth="0.34" color="#922b21"></a-box>
          <!-- Muatan (karung/kotak dalam bak) -->
          <a-box position="-0.14 0.26 0.05" width="0.16" height="0.1" depth="0.13" color="#c8a96a"></a-box>
          <a-box position="-0.14 0.26 -0.09" width="0.16" height="0.1" depth="0.1" color="#b8995a"></a-box>
          <a-box position="-0.28 0.26 0" width="0.12" height="0.08" depth="0.2" color="#d4b070"></a-box>

          <!-- ===== KABIN / CAB ===== -->
          <!-- Bodi kabin bawah -->
          <a-box position="0.22 0.14 0" width="0.28" height="0.22" depth="0.34" color="#e74c3c"></a-box>
          <!-- Atap kabin -->
          <a-box position="0.2 0.29 0" width="0.24" height="0.1" depth="0.3" color="#c0392b"></a-box>
          <!-- Kaca depan (windshield) -->
          <a-box position="0.36 0.22 0" width="0.02" height="0.16" depth="0.26" color="#aaddff" opacity="0.7"></a-box>
          <!-- Kaca samping kiri -->
          <a-box position="0.2 0.26 0.175" width="0.18" height="0.1" depth="0.015" color="#aaddff" opacity="0.6"></a-box>
          <!-- Kaca samping kanan -->
          <a-box position="0.2 0.26 -0.175" width="0.18" height="0.1" depth="0.015" color="#aaddff" opacity="0.6"></a-box>
          <!-- Lampu depan kiri -->
          <a-box position="0.37 0.12 0.11" width="0.02" height="0.06" depth="0.08" color="#ffffaa"></a-box>
          <!-- Lampu depan kanan -->
          <a-box position="0.37 0.12 -0.11" width="0.02" height="0.06" depth="0.08" color="#ffffaa"></a-box>
          <!-- Bumper depan -->
          <a-box position="0.38 0.04 0" width="0.03" height="0.06" depth="0.3" color="#888"></a-box>
          <!-- Spion kiri -->
          <a-box position="0.28 0.28 0.195" width="0.08" height="0.04" depth="0.02" color="#aaa"></a-box>
          <!-- Spion kanan -->
          <a-box position="0.28 0.28 -0.195" width="0.08" height="0.04" depth="0.02" color="#aaa"></a-box>
          <!-- Grill depan -->
          <a-box position="0.37 0.08 0" width="0.015" height="0.08" depth="0.28" color="#777"></a-box>

          <!-- ===== KNALPOT / CEROBONG ASAP ===== -->
          <a-cylinder
            position="0.08 0.38 0.14"
            radius="0.025" height="0.12"
            color="#444">
          </a-cylinder>

          <!-- ===== PARTIKEL ASAP (custom component via JS) ===== -->
          <!-- 8 bola asap dengan delay berbeda, naik sambil membesar & memudar -->

          <!-- Asap 1 -->
          <a-sphere id="smoke1"
            position="0.08 0.44 0.14"
            radius="0.04"
            color="#b0b0b0" opacity="0.7"
            animation__rise="property: position; from: 0.08 0.44 0.14; to: 0.0 0.78 0.16; loop: true; dur: 1800; easing: easeOutQuad"
            animation__grow="property: scale; from: 1 1 1; to: 2.8 2.8 2.8; loop: true; dur: 1800; easing: easeOutQuad"
            animation__fade="property: components.material.opacity; from: 0.7; to: 0; loop: true; dur: 1800; easing: easeInQuad"
            animation__drift="property: position; from: 0.08 0.44 0.14; to: -0.06 0.78 0.18; loop: true; dur: 1800">
          </a-sphere>

          <!-- Asap 2 (delay 225ms) -->
          <a-sphere id="smoke2"
            position="0.08 0.44 0.14"
            radius="0.04"
            color="#aaaaaa" opacity="0.65"
            animation__rise="property: position; from: 0.08 0.44 0.14; to: -0.04 0.8 0.15; loop: true; dur: 1800; delay: 225; easing: easeOutQuad"
            animation__grow="property: scale; from: 1 1 1; to: 3 3 3; loop: true; dur: 1800; delay: 225; easing: easeOutQuad"
            animation__fade="property: components.material.opacity; from: 0.65; to: 0; loop: true; dur: 1800; delay: 225; easing: easeInQuad">
          </a-sphere>

          <!-- Asap 3 (delay 450ms) -->
          <a-sphere id="smoke3"
            position="0.08 0.44 0.14"
            radius="0.038"
            color="#c8c8c8" opacity="0.6"
            animation__rise="property: position; from: 0.08 0.44 0.14; to: 0.02 0.82 0.13; loop: true; dur: 1800; delay: 450; easing: easeOutQuad"
            animation__grow="property: scale; from: 1 1 1; to: 3.2 3.2 3.2; loop: true; dur: 1800; delay: 450; easing: easeOutQuad"
            animation__fade="property: components.material.opacity; from: 0.6; to: 0; loop: true; dur: 1800; delay: 450; easing: easeInQuad">
          </a-sphere>

          <!-- Asap 4 (delay 675ms) -->
          <a-sphere id="smoke4"
            position="0.08 0.44 0.14"
            radius="0.042"
            color="#b8b8b8" opacity="0.55"
            animation__rise="property: position; from: 0.08 0.44 0.14; to: -0.02 0.76 0.17; loop: true; dur: 1800; delay: 675; easing: easeOutQuad"
            animation__grow="property: scale; from: 1 1 1; to: 2.6 2.6 2.6; loop: true; dur: 1800; delay: 675; easing: easeOutQuad"
            animation__fade="property: components.material.opacity; from: 0.55; to: 0; loop: true; dur: 1800; delay: 675; easing: easeInQuad">
          </a-sphere>

          <!-- Asap 5 (delay 900ms) - lebih gelap/tebal -->
          <a-sphere id="smoke5"
            position="0.08 0.44 0.14"
            radius="0.05"
            color="#909090" opacity="0.75"
            animation__rise="property: position; from: 0.08 0.44 0.14; to: 0.04 0.85 0.14; loop: true; dur: 1800; delay: 900; easing: easeOutQuad"
            animation__grow="property: scale; from: 1 1 1; to: 3.5 3.5 3.5; loop: true; dur: 1800; delay: 900; easing: easeOutQuad"
            animation__fade="property: components.material.opacity; from: 0.75; to: 0; loop: true; dur: 1800; delay: 900; easing: easeInQuad">
          </a-sphere>

          <!-- Asap 6 (delay 1125ms) -->
          <a-sphere id="smoke6"
            position="0.08 0.44 0.14"
            radius="0.036"
            color="#d0d0d0" opacity="0.5"
            animation__rise="property: position; from: 0.08 0.44 0.14; to: -0.05 0.79 0.16; loop: true; dur: 1800; delay: 1125; easing: easeOutQuad"
            animation__grow="property: scale; from: 1 1 1; to: 2.9 2.9 2.9; loop: true; dur: 1800; delay: 1125; easing: easeOutQuad"
            animation__fade="property: components.material.opacity; from: 0.5; to: 0; loop: true; dur: 1800; delay: 1125; easing: easeInQuad">
          </a-sphere>

          <!-- Asap 7 (delay 1350ms) -->
          <a-sphere id="smoke7"
            position="0.08 0.44 0.14"
            radius="0.045"
            color="#a8a8a8" opacity="0.65"
            animation__rise="property: position; from: 0.08 0.44 0.14; to: 0.01 0.81 0.15; loop: true; dur: 1800; delay: 1350; easing: easeOutQuad"
            animation__grow="property: scale; from: 1 1 1; to: 3.1 3.1 3.1; loop: true; dur: 1800; delay: 1350; easing: easeOutQuad"
            animation__fade="property: components.material.opacity; from: 0.65; to: 0; loop: true; dur: 1800; delay: 1350; easing: easeInQuad">
          </a-sphere>

          <!-- Asap 8 (delay 1575ms) -->
          <a-sphere id="smoke8"
            position="0.08 0.44 0.14"
            radius="0.04"
            color="#bcbcbc" opacity="0.6"
            animation__rise="property: position; from: 0.08 0.44 0.14; to: -0.03 0.83 0.13; loop: true; dur: 1800; delay: 1575; easing: easeOutQuad"
            animation__grow="property: scale; from: 1 1 1; to: 2.7 2.7 2.7; loop: true; dur: 1800; delay: 1575; easing: easeOutQuad"
            animation__fade="property: components.material.opacity; from: 0.6; to: 0; loop: true; dur: 1800; delay: 1575; easing: easeInQuad">
          </a-sphere>

        </a-entity><!-- end shake entity -->
      </a-entity><!-- end truck-group -->

      <!-- Bayangan truk -->
      <a-circle
        position="0 0.04 0"
        radius="0.44"
        rotation="-90 0 0"
        color="#000"
        opacity="0.15">
      </a-circle>

    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>

  <script>
    const marker = document.getElementById('marker');
    const info = document.getElementById('info');
    marker.addEventListener('markerFound', () => {
      info.textContent = '🚛 Truk tanjakan terdeteksi!';
      info.style.background = 'rgba(180,40,30,0.82)';
    });
    marker.addEventListener('markerLost', () => {
      info.textContent = '📷 Arahkan kamera ke marker Hiro';
      info.style.background = 'rgba(0,0,0,0.65)';
    });
  </script>
</body>
</html>
